<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event Ticketing API</title>

<style>
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
}

header {
  background: #020617;
  border-bottom: 1px solid #1e293b;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 { font-size: 1.2rem; }
header a {
  background: #e11d48;
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  text-decoration: none;
}

#token-bar {
  padding: 10px 40px;
  font-size: 0.75rem;
  background: #111827;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 18px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 6px 0 10px;
  border-radius: 6px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  padding: 9px;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

.btn-green { background: #22c55e; }
.btn-blue { background: #3b82f6; }
.btn-red { background: #ef4444; }
.btn-yellow { background: #f59e0b; }
.btn-purple { background: #a855f7; }

.response-box {
  margin-top: 10px;
  font-size: 0.75rem;
  background: #111827;
  padding: 10px;
  border-radius: 6px;
  white-space: pre-wrap;
}

.events-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin-top: 15px;
}

.event-item {
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 14px;
  transition: 0.2s;
}

.event-item:hover {
  border-color: #e11d48;
  transform: translateY(-3px);
}

.event-name {
  font-size: 1rem;
  font-weight: 600;
}

.event-meta {
  font-size: 0.75rem;
  color: #94a3b8;
}

.event-actions {
  margin-top: 10px;
  display: flex;
  gap: 6px;
}

.event-actions button {
  flex: 1;
  font-size: 0.7rem;
}
</style>
</head>

<body>

<header>
  <h1>🎟️ Ticket Booking Demo</h1>
  <a href="/api-docs/" target="_blank">Docs</a>
</header>

<div id="token-bar">🔒 Not logged in</div>

<div class="container">

<div class="card">
  <h3>Register</h3>
  <input id="reg-name" placeholder="Name"/>
  <input id="reg-email" placeholder="Email"/>
  <input id="reg-password" type="password" placeholder="Password"/>
  <button class="btn-green" onclick="register()">Register</button>
  <div id="reg-res" class="response-box"></div>
</div>

<div class="card">
  <h3>Login</h3>
  <input id="login-email" placeholder="Email"/>
  <input id="login-password" type="password" placeholder="Password"/>
  <button class="btn-blue" onclick="login()">Login</button>
  <div id="login-res" class="response-box"></div>
</div>

<div class="card">
  <h3>Create Event</h3>
  <input id="event-name" placeholder="Event name"/>
  <input id="event-seats" type="number" placeholder="Seats"/>
  <button class="btn-green" onclick="submitCreateEvent()">Create</button>
  <div id="create-event-res" class="response-box"></div>
</div>

<div class="card">
  <h2>🎬 Now Showing</h2>
  <button class="btn-blue" onclick="getEvents()">Refresh</button>
  <div class="events-list" id="events-list"></div>
</div>

<div class="card">
  <h3>Book Ticket</h3>
  <input id="book-event-id" placeholder="Event ID"/>
  <button class="btn-green" onclick="bookTicket()">Book</button>
  <div id="book-res" class="response-box"></div>
</div>

<div class="card">
  <h3>Cancel Ticket</h3>
  <input id="cancel-code" placeholder="Ticket code"/>
  <button class="btn-yellow" onclick="cancelTicket()">Cancel</button>
  <div id="cancel-res" class="response-box"></div>
</div>

<div class="card">
  <h3>Validate Ticket</h3>
  <input id="validate-code" placeholder="Ticket code"/>
  <button class="btn-purple" onclick="validateTicket()">Validate</button>
  <div id="validate-res" class="response-box"></div>
</div>

</div>

<script>
let token = null;

function setToken(t){
  token = t;
  document.getElementById("token-bar").innerText = "Logged in";
}

function showRes(id,data){
  document.getElementById(id).innerText = JSON.stringify(data,null,2);
}

async function apiFetch(method,url,body){
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = 'Bearer '+token;

  const res = await fetch(url,{
    method,
    headers,
    body: body? JSON.stringify(body):null
  });

  return res.json();
}

async function register(){
  const data = await apiFetch('POST','/api/auth/register',{
    name: reg-name.value,
    email: reg-email.value,
    password: reg-password.value
  });
  showRes('reg-res',data);
  if(data.token) setToken(data.token);
}

async function login(){
  const data = await apiFetch('POST','/api/auth/login',{
    email: login-email.value,
    password: login-password.value
  });
  showRes('login-res',data);
  if(data.token) setToken(data.token);
}

async function submitCreateEvent(){
  const data = await apiFetch('POST','/api/events',{
    name: event-name.value,
    totalSeats: parseInt(event-seats.value)
  });
  showRes('create-event-res',data);
  getEvents();
}

async function getEvents(){
  const data = await apiFetch('GET','/api/events');

  const list = document.getElementById("events-list");

  if(!data.length){
    list.innerHTML = "No events";
    return;
  }

  list.innerHTML = data.map(e=>`
    <div class="event-item">
      <div class="event-name">${e.name}</div>
      <div class="event-meta">🎟️ ${e.availableSeats} seats left</div>
      <div class="event-actions">
        <button class="btn-green" onclick="quickBook('${e._id}')">Book</button>
      </div>
    </div>
  `).join('');
}

function quickBook(id){
  document.getElementById("book-event-id").value = id;
  bookTicket();
}

async function bookTicket(){
  const id = document.getElementById("book-event-id").value;

  const data = await apiFetch('POST','/api/events/'+id+'/book');
  showRes('book-res',data);

  if(data.ticket){
    cancel-code.value = data.ticket.ticketCode;
    validate-code.value = data.ticket.ticketCode;
  }

  getEvents();
}

async function cancelTicket(){
  const code = cancel-code.value;
  const data = await apiFetch('PUT','/api/events/ticket/'+code+'/cancel');
  showRes('cancel-res',data);
  getEvents();
}

async function validateTicket(){
  const code = validate-code.value;
  const data = await apiFetch('GET','/api/events/ticket/validate/'+code);
  showRes('validate-res',data);
}

getEvents();
</script>

</body>
</html>
